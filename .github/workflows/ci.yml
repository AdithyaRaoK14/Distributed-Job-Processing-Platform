name: CI

on:
push:
branches: [main, develop]
pull_request:
branches: [main]

jobs:
test-backend:
name: Backend Tests
runs-on: ubuntu-latest

```
services:
  postgres:
    image: postgres:15-alpine
    env:
      POSTGRES_DB: jobqueue_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    options: >-
      --health-cmd pg_isready
      --health-interval 5s
      --health-timeout 5s
      --health-retries 10

steps:
  - uses: actions/checkout@v4

  - name: Set up Python 3.11
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: pip

  - name: Install backend dependencies
    run: |
      pip install -r backend/requirements.txt
      pip install fakeredis aiosqlite pytest-cov

  - name: Install worker dependencies
    run: pip install -r worker/requirements.txt

  - name: Run tests with coverage
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jobqueue_test
      REDIS_URL: redis://localhost:6379
      PYTHONPATH: ${{ github.workspace }}
    run: |
      pytest tests/ -v \
        --cov=backend/app \
        --cov-report=term-missing \
        --cov-report=xml \
        --tb=short \
        -p no:warnings

  - name: Upload coverage
    uses: codecov/codecov-action@v4
    with:
      file: coverage.xml
      fail_ci_if_error: false
```

lint:
name: Lint
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - run: pip install ruff

  - run: ruff check backend/ worker/ --select E,W,F --ignore E501
```

build-images:
name: Build Docker Images
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Build backend image
    uses: docker/build-push-action@v5
    with:
      context: ./backend
      push: false

  - name: Build worker image
    uses: docker/build-push-action@v5
    with:
      context: ./worker
      push: false

  - name: Build frontend image
    uses: docker/build-push-action@v5
    with:
      context: ./frontend
      push: false
```

integration:
name: Integration (Docker Compose)
runs-on: ubuntu-latest
needs: [test-backend, build-images]

```
steps:
  - uses: actions/checkout@v4

  - name: Start stack
    run: docker compose up -d --build

  - name: Wait for backend health
    run: |
      for i in $(seq 1 30); do
        curl -sf http://localhost:8000/health && break
        echo "Waiting... ($i/30)"
        sleep 3
      done

  - name: Debug containers
    run: |
      docker ps -a
      docker compose ps
      docker compose logs worker

  - name: Smoke test — submit and poll a job
    run: |
      JOB=$(curl -sf -X POST http://localhost:8000/api/jobs/submit \
        -H 'Content-Type: application/json' \
        -d '{"type":"noop","payload":{},"priority":"high"}')

      echo "Submitted: $JOB"

      JOB_ID=$(echo "$JOB" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

      for i in $(seq 1 20); do
        STATUS=$(curl -sf http://localhost:8000/api/jobs/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
        echo "Status: $STATUS"

        if [ "$STATUS" = "completed" ]; then
          break
        fi

        sleep 2
      done

      [ "$STATUS" = "completed" ] || (echo "Job did not complete!" && exit 1)

  - name: Check worker count
    run: |
      WORKERS=$(curl -sf http://localhost:8000/api/workers | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
      echo "Active workers: $WORKERS"
      [ "$WORKERS" -ge 1 ] || (echo "No workers registered!" && exit 1)

  - name: Print logs on failure
    if: failure()
    run: docker compose logs

  - name: Tear down
    if: always()
    run: docker compose down -v
```
